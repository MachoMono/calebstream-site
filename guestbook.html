<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Leave a message for calebstillstreams" />
  <title>Guestbook — calebstillstreams</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #F9C424;
      --dark: #0d0d0d;
      --panel-bg: #111;
      --text: #e8e8e8;
      --muted: #888;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(circle, rgba(249,196,36,0.04) 1px, transparent 1px);
      background-size: 18px 18px;
    }

    /* ── BANNER ── */
    .banner {
      width: 100%;
      max-height: 200px;
      overflow: hidden;
      position: relative;
      border-bottom: 4px solid var(--yellow);
    }

    .banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      display: block;
      filter: contrast(1.05) saturate(0.85) brightness(0.7);
    }

    .banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, var(--dark) 100%);
    }

    /* ── HEADER ── */
    .site-header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.25rem 2rem;
      border-bottom: 2px solid #222;
      background: var(--dark);
    }

    .site-header .logo {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid var(--yellow);
      object-fit: cover;
      flex-shrink: 0;
    }

    .site-header .title-block { flex: 1; }

    .site-header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      color: var(--yellow);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      line-height: 1;
    }

    .site-header .tagline {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 0.2rem;
    }

    .site-header nav {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .site-header nav a {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text);
      text-decoration: none;
      padding: 0.3rem 0.75rem;
      border: 1px solid #333;
      transition: border-color 0.15s, color 0.15s;
    }

    .site-header nav a:hover,
    .site-header nav a.active {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    /* ── MAIN ── */
    .main {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--yellow);
      border-left: 3px solid var(--yellow);
      padding-left: 0.6rem;
      margin-bottom: 1.25rem;
    }

    /* ── FORM ── */
    .form-panel {
      background: var(--panel-bg);
      border: 2px solid #222;
      border-top: 3px solid var(--yellow);
      padding: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.35rem; }

    label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--yellow);
    }

    input, select, textarea {
      background: #0a0a0a;
      border: 1px solid #333;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      padding: 0.55rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--yellow);
    }

    select option { background: #111; }

    textarea {
      resize: vertical;
      min-height: 90px;
      margin-bottom: 1rem;
    }

    .char-count {
      font-size: 0.72rem;
      color: #555;
      text-align: right;
      margin-top: -0.75rem;
      margin-bottom: 1rem;
    }

    .char-count.warn { color: #e05c2a; }

    .btn-submit {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: var(--yellow);
      color: #000;
      border: 2px solid var(--yellow);
      padding: 0.6rem 1.5rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-submit:hover { background: #e0ad1a; border-color: #e0ad1a; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .form-status {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      min-height: 1.2em;
    }

    .form-status.ok { color: var(--yellow); }
    .form-status.err { color: #e05c2a; }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(to right, var(--yellow), transparent);
      margin: 2.5rem 0;
      opacity: 0.35;
    }

    /* ── MESSAGE FEED ── */
    .feed { display: flex; flex-direction: column; gap: 0; }

    .msg-card {
      border: 2px solid #222;
      border-top: none;
      padding: 1.1rem 1.4rem;
      background: var(--panel-bg);
    }

    .msg-card:first-child { border-top: 3px solid var(--yellow); }

    .msg-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.4rem;
      flex-wrap: wrap;
    }

    .msg-handle {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      color: var(--text);
      text-transform: uppercase;
    }

    .msg-platform {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #555;
      border: 1px solid #2a2a2a;
      padding: 0.1rem 0.4rem;
    }

    .msg-platform.twitch   { color: #9147ff; border-color: #9147ff33; }
    .msg-platform.twitter  { color: #1da1f2; border-color: #1da1f233; }
    .msg-platform.youtube  { color: #ff0000; border-color: #ff000033; }
    .msg-platform.instagram{ color: #e1306c; border-color: #e1306c33; }
    .msg-platform.bluesky  { color: #0085ff; border-color: #0085ff33; }

    .msg-ts {
      margin-left: auto;
      font-size: 0.7rem;
      color: #444;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .msg-body {
      font-size: 0.92rem;
      color: #bbb;
      line-height: 1.6;
      word-break: break-word;
    }

    .feed-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: #444;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      border: 2px dashed #222;
    }

    .feed-loading {
      text-align: center;
      padding: 2rem;
      color: #444;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      border-top: 2px solid #1a1a1a;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    footer .footer-left {
      font-size: 0.78rem;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    footer nav { display: flex; gap: 1.25rem; }

    footer nav a {
      font-size: 0.78rem;
      color: #555;
      text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.15s;
    }

    footer nav a:hover { color: var(--yellow); }

    @media (max-width: 600px) {
      .site-header { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="banner">
    <img src="banner.png" alt="" />
  </div>

  <header class="site-header">
    <img class="logo" src="logo.png" alt="calebstillstreams logo" />
    <div class="title-block">
      <h1>calebstillstreams</h1>
      <div class="tagline">Twitch &middot; YouTube &middot; transmissions from the void</div>
    </div>
    <nav>
      <a href="/">Stream</a>
      <a href="/#blog">Blog</a>
      <a href="/guestbook.html" class="active">Guestbook</a>
      <a href="https://www.twitch.tv/calebstillstreams" target="_blank" rel="noopener">Twitch</a>
    </nav>
  </header>

  <main class="main">

    <section>
      <div class="section-label">// Leave a message</div>
      <div class="form-panel">
        <form id="gb-form" novalidate>
          <div class="form-row">
            <div class="field">
              <label for="handle">Your handle</label>
              <input id="handle" name="handle" type="text" placeholder="@yourname" maxlength="50" autocomplete="off" required />
            </div>
            <div class="field">
              <label for="platform">Platform</label>
              <select id="platform" name="platform">
                <option value="twitch">Twitch</option>
                <option value="twitter">Twitter / X</option>
                <option value="youtube">YouTube</option>
                <option value="instagram">Instagram</option>
                <option value="bluesky">Bluesky</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Say something..." maxlength="400" required></textarea>
          </div>
          <div class="char-count" id="char-count">0 / 400</div>
          <button class="btn-submit" type="submit" id="submit-btn">Post message</button>
          <div class="form-status" id="form-status"></div>
        </form>
      </div>
    </section>

    <div class="divider"></div>

    <section>
      <div class="section-label">// Messages</div>
      <div class="feed" id="feed">
        <div class="feed-loading">Loading...</div>
      </div>
    </section>

  </main>

  <footer>
    <div class="footer-left">calebstillstreams &copy; 2026</div>
    <nav>
      <a href="https://www.twitch.tv/calebstillstreams" target="_blank" rel="noopener">Twitch</a>
      <a href="https://www.youtube.com/@calebstillstreams" target="_blank" rel="noopener">YouTube</a>
    </nav>
  </footer>

  <script>
    const API = "https://calebstillstreams-webhook-if2erxe6bq-uc.a.run.app";

    const feed       = document.getElementById("feed");
    const form       = document.getElementById("gb-form");
    const submitBtn  = document.getElementById("submit-btn");
    const statusEl   = document.getElementById("form-status");
    const msgInput   = document.getElementById("message");
    const charCount  = document.getElementById("char-count");

    // ── char counter ──
    msgInput.addEventListener("input", () => {
      const n = msgInput.value.length;
      charCount.textContent = `${n} / 400`;
      charCount.classList.toggle("warn", n > 360);
    });

    // ── format timestamp ──
    function fmtDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    // ── render feed ──
    function renderFeed(messages) {
      if (!messages.length) {
        feed.innerHTML = '<div class="feed-empty">No messages yet — be the first</div>';
        return;
      }
      feed.innerHTML = messages.map((m, i) => `
        <div class="msg-card">
          <div class="msg-header">
            <span class="msg-handle">${escHtml(m.handle)}</span>
            <span class="msg-platform ${m.platform}">${escHtml(m.platform)}</span>
            <span class="msg-ts">${fmtDate(m.ts)}</span>
          </div>
          <div class="msg-body">${escHtml(m.message)}</div>
        </div>
      `).join("");
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // ── load messages ──
    async function loadMessages() {
      try {
        const r = await fetch(`${API}/guestbook`);
        if (!r.ok) throw new Error(r.status);
        const data = await r.json();
        renderFeed(data.messages);
      } catch (e) {
        feed.innerHTML = '<div class="feed-empty">Could not load messages</div>';
      }
    }

    // ── submit ──
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "";
      statusEl.className = "form-status";

      const handle  = document.getElementById("handle").value.trim();
      const platform = document.getElementById("platform").value;
      const message = msgInput.value.trim();

      if (!handle || !message) {
        statusEl.textContent = "Handle and message are required.";
        statusEl.className = "form-status err";
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Posting...";

      try {
        const r = await fetch(`${API}/guestbook`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ handle, platform, message }),
        });

        if (r.status === 429) {
          statusEl.textContent = "Too many messages — try again later.";
          statusEl.className = "form-status err";
          return;
        }
        if (!r.ok) throw new Error(r.status);

        statusEl.textContent = "Message posted.";
        statusEl.className = "form-status ok";
        form.reset();
        charCount.textContent = "0 / 400";
        charCount.classList.remove("warn");
        await loadMessages();
      } catch (e) {
        statusEl.textContent = "Something went wrong — try again.";
        statusEl.className = "form-status err";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Post message";
      }
    });

    loadMessages();
  </script>
</body>
</html>
